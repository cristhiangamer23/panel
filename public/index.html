<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buenos Aires RP | Panel</title>


<style>


*{

box-sizing:border-box;

font-family:"Segoe UI",sans-serif;

}



body{

margin:0;

background:

radial-gradient(circle at top,#17365F,#0B1220,#070B14);

color:white;

overflow-x:hidden;

}





/* =====================
LOGIN
===================== */


.login{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}




.login-box{


width:390px;

padding:45px;

border-radius:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

box-shadow:

0 25px 60px rgba(0,0,0,.45);

text-align:center;


}






/* LOGO */


.logo{


width:100px;

height:100px;

margin:auto auto 20px;

border-radius:50%;

overflow:hidden;


border:2px solid rgba(77,237,255,.5);


box-shadow:

0 0 25px rgba(77,237,255,.45);


}



.logo img{


width:100%;

height:100%;


object-fit:cover;


}








/* TITULO */


h1{


margin:0;

font-size:32px;

font-weight:900;



background:

linear-gradient(
90deg,
#4DEDFF,
white,
#4DEDFF
);



background-size:200%;


-webkit-background-clip:text;

-webkit-text-fill-color:transparent;


animation:shine 4s linear infinite;


}



@keyframes shine{


0%{

background-position:0%;

}


100%{

background-position:200%;

}


}






/* TEXTO ABAJO */


.subtitle{


margin:12px 0 25px;


font-size:17px;


font-weight:bold;


background:

linear-gradient(
90deg,
#4DEDFF,
white,
#4DEDFF
);


background-size:200%;


-webkit-background-clip:text;


-webkit-text-fill-color:transparent;


animation:shine 4s linear infinite;


}







input{


width:100%;


padding:14px;


margin:8px 0;


border:none;


outline:none;


border-radius:12px;


background:#0F172A;


color:white;


font-size:15px;


}



input:focus{


box-shadow:

0 0 15px rgba(77,237,255,.35);


}







.login-btn{


width:100%;


padding:15px;


margin-top:15px;


border:none;


border-radius:14px;


cursor:pointer;


font-size:16px;


font-weight:bold;


color:#06121D;



background:

linear-gradient(
90deg,
#00C6FF,
#4DEDFF
);



transition:.25s;


}



.login-btn:hover{


transform:translateY(-3px);


box-shadow:

0 0 25px rgba(77,237,255,.45);


}






#error{


color:#ef4444;


}





.footer{


margin-top:25px;


font-size:12px;


color:#64748B;


}







.hidden{


display:none;


}



</style>


</head>


<body>




<!-- LOGIN -->


<div id="loginBox" class="login">



<div class="login-box">





<div class="logo">


<img src="https://media.discordapp.net/attachments/1422562797148962929/1524142130363371682/buenos_Aires_RP.png?ex=6a5542f9&is=6a53f179&hm=41331dc1ae4d44f399e1f1d48918c1333f686632b24f94e1da4f6901f1b7b91f&=&format=webp&quality=lossless&width=930&height=930"

alt="Buenos Aires RP">


</div>





<h1>

Buenos Aires RP

</h1>





<p class="subtitle">

Buenos Aires RP | Panel Administrativo

</p>





<input id="user" placeholder="👤 Usuario">



<input id="pass" type="password" placeholder="🔒 Contraseña">





<button class="login-btn" onclick="login()">

Iniciar Sesión

</button>





<p id="error"></p>





<div class="footer">

© 2026 Buenos Aires RP

</div>



</div>



</div>

<!-- PANEL -->

<div id="panel" class="hidden">


<header class="topbar">


<div>

<h2>

Buenos Aires RP

</h2>


<span id="welcome">

</span>


</div>



<div>

<span id="roleBadge">

</span>


</div>



</header>





<!-- ESTADISTICAS -->


<div class="stats">



<div class="stat-card">


<div class="stat-icon">

👥

</div>


<h3 id="staffCount">

0

</h3>


<p>

Personal

</p>


</div>





<div class="stat-card">


<div class="stat-icon">

📢

</div>


<h3 id="postCount">

0

</h3>


<p>

Actualizaciones

</p>


</div>



</div>







<!-- BOTONES -->


<div class="nav">



<button class="tab active" onclick="show('updates')">

📢 Actualizaciones

</button>




<button class="tab" onclick="show('staff')">

👥 Staff

</button>



</div>






<div class="container">



<div id="updates">

</div>




<div id="staff" class="hidden">

</div>



</div>


</div>









<style>



/* =====================
TOPBAR
===================== */


.topbar{


display:flex;


justify-content:space-between;


align-items:center;


padding:25px;



background:rgba(17,24,39,.85);



backdrop-filter:blur(15px);



border-bottom:

1px solid rgba(77,237,255,.25);


}





.topbar h2{


margin:0;


font-size:30px;


color:#4DEDFF;


}




#welcome{


color:#94A3B8;


}




#roleBadge{


background:

linear-gradient(
90deg,
#00C6FF,
#4DEDFF
);



color:#06121D;


padding:8px 18px;


border-radius:25px;


font-weight:bold;


}






/* =====================
ESTADISTICAS
===================== */


.stats{


display:grid;


grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));


gap:20px;


padding:25px;


}




.stat-card{


background:

linear-gradient(
145deg,
#182435,
#111827
);



padding:25px;


border-radius:20px;



text-align:center;



border:

1px solid rgba(77,237,255,.15);



box-shadow:

0 10px 30px rgba(0,0,0,.35);



transition:.3s;


}




.stat-card:hover{


transform:translateY(-5px);


border-color:#4DEDFF;


box-shadow:

0 0 25px rgba(77,237,255,.3);


}





.stat-icon{


font-size:40px;


}





.stat-card h3{


font-size:38px;


margin:10px 0;


color:#4DEDFF;


}




.stat-card p{


color:#94A3B8;


}







/* =====================
BOTONES NAVEGACION
===================== */


.nav{


display:flex;


justify-content:center;


gap:15px;


padding:20px;


}





.tab{


padding:14px 28px;


border:none;


border-radius:14px;


cursor:pointer;


font-weight:bold;


font-size:15px;


color:white;



background:#2563EB;



transition:.25s;


}




.tab:hover{


transform:translateY(-3px);


box-shadow:

0 0 20px rgba(37,99,235,.5);


}




.tab.active{


background:

linear-gradient(
90deg,
#00C6FF,
#4DEDFF
);



color:#06121D;



box-shadow:

0 0 20px rgba(77,237,255,.45);


}







/* =====================
CONTENEDOR
===================== */


.container{


max-width:950px;


margin:auto;


padding:20px;


}







/* TARJETAS DE ACTUALIZACION Y STAFF */


.card{


position:relative;



background:

linear-gradient(
145deg,
rgba(30,41,59,.95),
rgba(15,23,42,.95)
);



padding:25px;



border-radius:22px;



margin-top:18px;



border:

1px solid rgba(77,237,255,.18);



box-shadow:

0 15px 35px rgba(0,0,0,.35);



overflow:hidden;



transition:.3s;


}





.card::before{


content:"";


position:absolute;


top:0;


left:0;


height:3px;


width:100%;



background:

linear-gradient(
90deg,
#00C6FF,
#4DEDFF
);



}





.card:hover{


transform:translateY(-5px);


border-color:#4DEDFF;


box-shadow:

0 0 30px rgba(77,237,255,.25);


}





/* RESPONSIVE */


@media(max-width:600px){



.topbar{


flex-direction:column;


gap:15px;


text-align:center;


}




.nav{


flex-direction:column;


}



.tab{


width:100%;


}


}

</style>

<script>

let currentUser = null;

let USERS = [];

let POSTS = [];





async function login(){


let respuesta = await fetch("/api/login",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


user:user.value,


pass:pass.value


})


});



let data = await respuesta.json();




if(!data.success){


error.innerHTML="❌ Usuario o contraseña incorrecta";


return;


}




currentUser=data.user;



loginBox.style.display="none";


panel.classList.remove("hidden");



welcome.innerHTML="Bienvenido "+currentUser.username;


roleBadge.innerHTML=currentUser.role;



await loadAll();



show("updates");


}









function isOwner(){


return currentUser && currentUser.role==="Dueño";


}









function show(tab){


updates.classList.add("hidden");


staff.classList.add("hidden");



document.getElementById(tab).classList.remove("hidden");


}









async function loadAll(){



let usuarios = await fetch("/api/users");


USERS = await usuarios.json();




let publicaciones = await fetch("/api/posts");


POSTS = await publicaciones.json();




render();


}









function render(){



/* CONTADORES */


document.getElementById("staffCount").innerHTML = USERS.length;


document.getElementById("postCount").innerHTML = POSTS.length;








/* =====================
ACTUALIZACIONES
===================== */


updates.innerHTML="";



if(isOwner()){


updates.innerHTML+=`


<div class="card">


<h3>

📢 Crear actualización

</h3>



<input id="titulo" placeholder="Título de actualización">


<textarea id="mensaje" placeholder="Escribe el mensaje..."></textarea>




<button class="login-btn" onclick="crearPost()">

Publicar

</button>



</div>


`;

}



POSTS.forEach(post=>{



updates.innerHTML+=`


<div class="card">


<div class="update-header">


<h3>

📢 ${post.titulo}

</h3>



<span class="status">

NUEVO

</span>



</div>




<p>

${post.mensaje}

</p>




<div class="update-footer">

🕒 ${post.fecha}

</div>






${isOwner()?`


<div class="update-actions">



<button class="discord-btn"

onclick="sendDiscord(${post.id})">

🔔 Discord

</button>




<button class="delete-btn"

onclick="deletePost(${post.id})">

🗑

</button>



</div>



`:''}



</div>


`;



});









/* =====================
STAFF
===================== */


staff.innerHTML="";



if(isOwner()){


staff.innerHTML+=`


<div class="card">


<h3>

👥 Añadir nuevo Staff

</h3>




<input id="newUser" placeholder="Nombre del usuario">


<input id="newRole" placeholder="Rango">





<button class="login-btn" onclick="addUser()">

Agregar Staff

</button>



</div>


`;

}



USERS.forEach(u=>{



staff.innerHTML+=`



<div class="card staff-card">



<div class="staff-profile">


<div class="staff-avatar">

👤

</div>



<div>


<h3>

${u.username}

</h3>



<span class="badge">

${u.role}

</span>



</div>



</div>






${isOwner()?`


<div class="staff-actions">



<button class="edit-btn"

onclick="editUser(${u.id},'${u.username}','${u.role}')">

✏️

</button>





<button class="delete-btn"

onclick="deleteUser(${u.id})">

🗑

</button>




</div>



`:''}



</div>



`;



});



}









async function addUser(){


if(!newRole.value){


alert("El rango es obligatorio");


return;


}




await fetch("/api/users",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


user:newUser.value,


role:newRole.value


})


});



loadAll();


}









function editUser(id,nombre,rango){



let modal=document.createElement("div");



modal.className="modal";



modal.innerHTML=`


<div class="modal-box">


<h3>

✏️ Editar Staff

</h3>



<input id="editName" value="${nombre}">



<input id="editRole" value="${rango}">





<button class="login-btn"

onclick="saveEdit(${id})">

Guardar

</button>





</div>


`;



document.body.appendChild(modal);



}









async function saveEdit(id){



await fetch("/api/users/"+id,{


method:"PUT",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


user:editName.value,


role:editRole.value


})


});



document.querySelector(".modal").remove();



loadAll();



}









async function deleteUser(id){



if(!confirm("¿Eliminar Staff?")) return;



await fetch("/api/users/"+id,{


method:"DELETE"


});



loadAll();



}









async function crearPost(){



await fetch("/api/posts",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


titulo:titulo.value,


mensaje:mensaje.value


})


});



loadAll();


}









async function deletePost(id){



if(!confirm("¿Eliminar actualización?")) return;



await fetch("/api/posts/"+id,{


method:"DELETE"


});



loadAll();


}









async function sendDiscord(id){



let post = POSTS.find(x=>x.id===id);



await fetch("/api/webhook",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify(post)


});



alert("✅ Actualización enviada a Discord");


}




</script>

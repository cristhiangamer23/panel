<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buenos Aires RP | Panel Staff</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:Arial, sans-serif;

background:linear-gradient(135deg,#0b1220,#0f172a);

color:white;

}



.login{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



.login-box{

width:360px;

max-width:100%;

padding:30px;

border-radius:16px;

background:rgba(17,24,39,.95);

text-align:center;

box-shadow:0 0 25px #0008;

}



input,textarea{

width:100%;

padding:12px;

margin:7px 0;

border-radius:10px;

border:none;

outline:none;

background:#0f172a;

color:white;

}



textarea{

height:120px;

resize:none;

}



button{

padding:10px 15px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}



.green{

background:#22c55e;

color:white;

}



.red{

background:#ef4444;

color:white;

}



.blue{

background:#2563eb;

color:white;

}



.hidden{

display:none;

}




.nav{

display:flex;

justify-content:center;

gap:10px;

padding:20px;

flex-wrap:wrap;

}



.tab{

background:#1f2937;

padding:12px 18px;

border-radius:10px;

cursor:pointer;

}



.container{

max-width:900px;

margin:auto;

padding:20px;

}



.card{

background:rgba(17,24,39,.9);

padding:20px;

border-radius:14px;

margin-top:15px;

}



.user{

display:flex;

justify-content:space-between;

align-items:center;

gap:10px;

}



.badge{

background:#334155;

padding:5px 10px;

border-radius:8px;

font-size:12px;

}



.actions{

display:flex;

gap:8px;

}




.modal{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.7);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



.modal-box{

width:350px;

max-width:100%;

background:#111827;

padding:25px;

border-radius:15px;

}



@media(max-width:600px){


.nav{

flex-direction:column;

}


.tab{

text-align:center;

}



.user{

flex-direction:column;

align-items:stretch;

}


.actions button{

width:100%;

}


}


</style>


</head>



<body>



<!-- LOGIN -->

<div id="loginBox" class="login">


<div class="login-box">


<h2>🇦🇷 Buenos Aires RP</h2>

<p>Panel Staff</p>



<input id="user" placeholder="Usuario">


<input id="pass" type="password" placeholder="Contraseña">



<button class="green" onclick="login()">

Entrar

</button>



<p id="error" style="color:#ef4444"></p>



</div>


</div>





<!-- PANEL -->


<div id="panel" class="hidden">



<div class="nav">


<div class="tab" onclick="show('updates')">

📢 Actualizaciones

</div>



<div class="tab" onclick="show('staff')">

👥 Staff

</div>



</div>





<div class="container">


<div id="updates"></div>


<div id="staff" class="hidden"></div>



</div>



</div>



<script>


let currentUser=null;


let USERS=[];


let POSTS=[];


async function login(){


let res = await fetch("/api/login",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

user:user.value,

pass:pass.value

})


});



let data = await res.json();



if(!data.success){


error.innerText="❌ Usuario o contraseña incorrecta";


return;


}



currentUser=data.user;



loginBox.style.display="none";


panel.classList.remove("hidden");



await loadAll();


show("updates");



}









function isOwner(){


return currentUser && currentUser.role==="Dueño";


}









function show(seccion){


updates.classList.add("hidden");


staff.classList.add("hidden");



document.getElementById(seccion).classList.remove("hidden");



}









async function loadAll(){



let userRes=await fetch("/api/users");


USERS=await userRes.json();




let postRes=await fetch("/api/posts");


POSTS=await postRes.json();




render();



}









function render(){



// =====================

// ACTUALIZACIONES

// =====================


updates.innerHTML="";




if(isOwner()){


updates.innerHTML+=`

<div class="card">


<h3>📢 Crear actualización</h3>


<input id="titulo" placeholder="Título">


<textarea id="mensaje" placeholder="Mensaje"></textarea>


<button class="green" onclick="crearPost()">

Publicar

</button>


</div>


`;


}






POSTS.forEach(p=>{


updates.innerHTML+=`

<div class="card">


<h3>${p.titulo}</h3>


<p>${p.mensaje}</p>


<small>${p.fecha}</small>



${isOwner()?`


<br><br>


<button class="red" onclick="deletePost(${p.id})">

🗑 Eliminar

</button>



`:''}



</div>


`;



});








// =====================

// STAFF

// =====================


staff.innerHTML="";





if(isOwner()){


staff.innerHTML+=`

<div class="card">


<h3>👥 Agregar Staff</h3>


<input id="newUser" placeholder="Nombre del Staff">


<input id="newRole" placeholder="Rango">


<button class="green" onclick="addUser()">

Agregar

</button>


</div>


`;



}






USERS.forEach(u=>{



staff.innerHTML+=`

<div class="card user">


<div>


👤 ${u.username}


<span class="badge">

${u.role}

</span>


</div>




${isOwner()?`


<div class="actions">


<button class="blue"

onclick="editUser(${u.id},'${u.username}','${u.role}')">

✏️ Editar

</button>



<button class="red"

onclick="deleteUser(${u.id})">

🗑 Eliminar

</button>


</div>



`:''}



</div>


`;



});



}









async function addUser(){



if(!newRole.value){


alert("El rango es obligatorio");


return;


}





await fetch("/api/users",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


adminUser:currentUser.username,


adminPass:currentUser.password,


user:newUser.value,


role:newRole.value


})


});



loadAll();


}
function editUser(id,nombre,rango){


let modal=document.createElement("div");


modal.className="modal";


modal.innerHTML=`

<div class="modal-box">


<h3>✏️ Editar Staff</h3>


<input id="editName" value="${nombre}" placeholder="Nombre">


<input id="editRole" value="${rango}" placeholder="Rango">


<button class="green" onclick="saveEdit(${id})">

Guardar

</button>



<button class="red" onclick="this.closest('.modal').remove()">

Cancelar

</button>



</div>


`;



document.body.appendChild(modal);


}









async function saveEdit(id){



let nombre=document.getElementById("editName").value;


let rango=document.getElementById("editRole").value;




if(!rango){


alert("El rango es obligatorio");


return;


}





let res=await fetch("/api/users/"+id,{


method:"PUT",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


adminUser:currentUser.username,


adminPass:currentUser.password,


user:nombre,


role:rango


})


});



let data=await res.json();





if(!data.success){


alert(data.message || "Error al editar");


return;


}






// Cerrar modal después de guardar

let modal=document.querySelector(".modal");


if(modal){

modal.remove();

}





// Actualizar lista

await loadAll();



}









async function deleteUser(id){



let confirmar=confirm("¿Eliminar este usuario?");



if(!confirmar)return;




await fetch("/api/users/"+id,{


method:"DELETE",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


adminUser:currentUser.username,


adminPass:currentUser.password


})


});



loadAll();


}









async function crearPost(){



await fetch("/api/posts",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


adminUser:currentUser.username,


adminPass:currentUser.password,


titulo:titulo.value,


mensaje:mensaje.value


})


});



loadAll();



}









async function deletePost(id){



let confirmar=confirm("¿Eliminar actualización?");



if(!confirmar)return;




await fetch("/api/posts/"+id,{


method:"DELETE",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


adminUser:currentUser.username,


adminPass:currentUser.password


})


});



loadAll();


}



</script>


</body>


</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buenos Aires RP | Panel</title>


<style>

body{

margin:0;

font-family:Arial;

background:linear-gradient(135deg,#0b1220,#0f172a);

color:white;

}


.login{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}


.login-box{

width:360px;

max-width:90%;

padding:30px;

background:rgba(17,24,39,.9);

border-radius:16px;

text-align:center;

}


input,textarea{

width:100%;

box-sizing:border-box;

padding:12px;

margin:6px 0;

border:0;

border-radius:10px;

background:#0f172a;

color:white;

}



textarea{

height:120px;

}



button{

padding:10px 15px;

border:0;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}


.green{

background:#22c55e;

color:white;

}


.red{

background:#ef4444;

color:white;

}


.blue{

background:#2563eb;

color:white;

}



.hidden{

display:none;

}



.nav{

display:flex;

justify-content:center;

gap:10px;

padding:20px;

}



.tab{

background:#1f2937;

padding:10px 15px;

border-radius:8px;

cursor:pointer;

}



.container{

max-width:900px;

margin:auto;

padding:20px;

}



.card{

background:rgba(17,24,39,.9);

padding:20px;

border-radius:14px;

margin-top:15px;

}



.user{

display:flex;

justify-content:space-between;

align-items:center;

}



.badge{

background:#334155;

padding:5px 10px;

border-radius:8px;

font-size:12px;

}





.modal{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#0009;

display:flex;

justify-content:center;

align-items:center;

}



.modal-box{

background:#111827;

padding:25px;

border-radius:15px;

width:350px;

}




@media(max-width:600px){


.nav{

flex-direction:column;

}


.user{

flex-direction:column;

gap:10px;

}



button{

width:100%;

}


}



</style>


</head>


<body>





<div id="loginBox" class="login">


<div class="login-box">


<h2>🇦🇷 Buenos Aires RP</h2>


<p>Panel Staff</p>


<input id="user" placeholder="Usuario">


<input id="pass" type="password" placeholder="Contraseña">


<button class="green" onclick="login()">

Entrar

</button>


<p id="error"></p>


</div>


</div>








<div id="panel" class="hidden">


<div class="nav">


<div class="tab" onclick="show('updates')">

📢 Actualizaciones

</div>


<div class="tab" onclick="show('staff')">

👥 Staff

</div>


</div>





<div class="container">


<div id="updates"></div>


<div id="staff" class="hidden"></div>


</div>



</div>







<script>


let currentUser=null;

let USERS=[];

let POSTS=[];





async function login(){


let r=await fetch("/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:user.value,

pass:pass.value

})

});


let data=await r.json();



if(!data.success){

error.innerHTML="❌ Login incorrecto";

return;

}



currentUser=data.user;


loginBox.style.display="none";

panel.classList.remove("hidden");


loadAll();


show("updates");


}






function isOwner(){


return currentUser.role==="Dueño";


}






function show(id){


updates.classList.add("hidden");

staff.classList.add("hidden");


document.getElementById(id).classList.remove("hidden");


}








async function loadAll(){


let u=await fetch("/api/users");

USERS=await u.json();



let p=await fetch("/api/posts");

POSTS=await p.json();



render();


}








function render(){


updates.innerHTML="";


if(isOwner()){


updates.innerHTML+=`

<div class="card">


<h3>Crear actualización</h3>


<input id="titulo" placeholder="Título">


<textarea id="mensaje" placeholder="Mensaje"></textarea>


<button class="green" onclick="crearPost()">

Publicar

</button>


</div>

`;

}





POSTS.forEach(p=>{


updates.innerHTML+=`

<div class="card">

<h3>${p.titulo}</h3>

<p>${p.mensaje}</p>

<small>${p.fecha}</small>


${isOwner()?`

<br>

<button class="red" onclick="deletePost(${p.id})">

🗑 Eliminar

</button>

`:''}


</div>

`;

});







staff.innerHTML="";



if(isOwner()){


staff.innerHTML+=`

<div class="card">


<h3>Agregar Staff</h3>


<input id="newUser" placeholder="Nombre">


<input id="newRole" placeholder="Rango">


<button class="green" onclick="addUser()">

Agregar

</button>


</div>

`;

}






USERS.forEach(u=>{


staff.innerHTML+=`

<div class="card user">


<div>

👤 ${u.username}

<span class="badge">

${u.role}

</span>

</div>



${isOwner()?`

<div>


<button class="blue"
onclick="editUser(${u.id},'${u.username}','${u.role}')">

✏️

</button>



<button class="red"
onclick="deleteUser(${u.id})">

🗑️

</button>


</div>

`:''}


</div>

`;

});


}









async function addUser(){


await fetch("/api/users",{

method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

user:newUser.value,

role:newRole.value

})


});


loadAll();


}








function editUser(id,nombre,rango){


let div=document.createElement("div");


div.className="modal";


div.innerHTML=`

<div class="modal-box">


<h3>Editar Staff</h3>


<input id="editName" value="${nombre}">


<input id="editRole" value="${rango}" placeholder="Rango">


<button class="green" onclick="saveEdit(${id},this)">

Guardar

</button>


<button class="red" onclick="this.parentElement.parentElement.remove()">

Cancelar

</button>


</div>

`;


document.body.appendChild(div);


}









async function saveEdit(id,btn){


let name=document.getElementById("editName").value;

let role=document.getElementById("editRole").value;



if(!role){

alert("El rango es obligatorio");

return;

}



await fetch("/api/users/"+id,{

method:"PUT",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:name,

role:role

})

});


btn.parentElement.parentElement.remove();


loadAll();


}









async function deleteUser(id){


await fetch("/api/users/"+id,{

method:"DELETE"

});


loadAll();


}








async function crearPost(){


await fetch("/api/posts",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

titulo:titulo.value,

mensaje:mensaje.value

})

});


loadAll();


}








async function deletePost(id){


await fetch("/api/posts/"+id,{

method:"DELETE"

});


loadAll();


}



</script>



</body>

</html>

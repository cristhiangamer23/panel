<!DOCTYPE html>
<html lang="es">

<head>

<title>Buenos Aires RP | Panel administrativo </title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}


body{

margin:0;

min-height:100vh;

background:
radial-gradient(circle at top,#17365F,#0B1220,#070B14);

color:white;

}



/* LOGIN */

.login{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



.login-box{

width:390px;

padding:45px;

border-radius:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 25px 60px rgba(0,0,0,.45);

text-align:center;

}



/* LOGO */

.logo{

width:100px;

height:100px;

margin:0 auto 20px;

border-radius:50%;

overflow:hidden;

border:2px solid rgba(77,237,255,.5);

box-shadow:
0 0 25px rgba(77,237,255,.45);

}



.logo img{

width:100%;

height:100%;

object-fit:cover;

}



/* TITULO */

h1{

margin:0;

font-size:32px;

font-weight:900;

background:linear-gradient(
90deg,
#4DEDFF,
white,
#4DEDFF
);

background-size:200%;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

animation:shine 4s linear infinite;

}



@keyframes shine{

0%{

background-position:0%;

}

100%{

background-position:200%;

}

}



/* TEXTO DEBAJO */

.subtitle{

margin:12px 0 25px;

font-size:18px;

font-weight:700;

background:linear-gradient(
90deg,
#4DEDFF,
white,
#4DEDFF
);

background-size:200%;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

animation:shine 4s linear infinite;

}



/* INPUT */

input{

width:100%;

padding:14px;

margin:8px 0;

border:none;

outline:none;

border-radius:12px;

background:#0F172A;

color:white;

font-size:15px;

}



input:focus{

box-shadow:

0 0 15px rgba(77,237,255,.35);

}



/* BOTON LOGIN */

.login-btn{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:bold;

font-size:16px;

color:#06121D;

background:

linear-gradient(
90deg,
#00C6FF,
#4DEDFF
);

transition:.25s;

}



.login-btn:hover{

transform:translateY(-3px);

box-shadow:

0 0 25px rgba(77,237,255,.45);

}



/* ERROR */

#error{

color:#ef4444;

margin-top:15px;

}



/* FOOTER */

.footer{

margin-top:25px;

font-size:12px;

color:#64748B;

}



/* OCULTO */

.hidden{

display:none;

}


</style>

</head>


<body>


<div id="loginBox" class="login">


<div class="login-box">



<div class="logo">

<img src="https://media.discordapp.net/attachments/1422562797148962929/1524142130363371682/buenos_Aires_RP.png?ex=6a5542f9&is=6a53f179&hm=41331dc1ae4d44f399e1f1d48918c1333f686632b24f94e1da4f6901f1b7b91f&=&format=webp&quality=lossless&width=930&height=930" alt="Buenos Aires RP">

</div>



<h1>

BUENOS AIRES RP

</h1>



<p class="subtitle">

Buenos Aires RP | Panel Administrativo

</p>



<input id="user" placeholder="👤 Usuario">



<input id="pass" type="password" placeholder="🔒 Contraseña">



<button class="login-btn" onclick="login()">

Iniciar Sesión

</button>



<p id="error"></p>



<div class="footer">

© 2026 Buenos Aires RP

</div>



</div>


</div>

  <!-- PANEL PRINCIPAL -->

<div id="panel" class="hidden">


<header class="topbar">

<div>

<h2>
Buenos Aires RP
</h2>

<span id="welcome"></span>

</div>


<div>

<span id="roleBadge"></span>

</div>

</header>




<!-- ESTADÍSTICAS -->

<div class="stats">


<div class="stat-card">

<div class="stat-icon">
👥
</div>

<h3 id="staffCount">
0
</h3>

<p>
Personal
</p>

</div>



<div class="stat-card">

<div class="stat-icon">
📢
</div>

<h3 id="postCount">
0
</h3>

<p>
Actualizaciones
</p>

</div>


</div>





<!-- PESTAÑAS -->

<div class="nav">


<button class="tab active" onclick="show('updates')">

📢 Actualizaciones

</button>



<button class="tab" onclick="show('staff')">

👥 Staff

</button>


</div>





<div class="container">


<div id="updates"></div>


<div id="staff" class="hidden"></div>


</div>


</div>





<style>


.topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:25px;

background:rgba(17,24,39,.9);

border-bottom:1px solid rgba(77,237,255,.25);

backdrop-filter:blur(15px);

}



.topbar h2{

margin:0;

font-size:30px;

color:#4DEDFF;

}



#welcome{

color:#94A3B8;

}



#roleBadge{

background:linear-gradient(
90deg,
#00C6FF,
#4DEDFF
);

color:#07131F;

padding:8px 18px;

border-radius:30px;

font-weight:bold;

}




.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:20px;

padding:25px;

}



.stat-card{

background:
linear-gradient(
180deg,
#182435,
#111827
);

padding:25px;

border-radius:20px;

text-align:center;

border:1px solid rgba(77,237,255,.15);

box-shadow:
0 10px 30px rgba(0,0,0,.35);

transition:.25s;

}



.stat-card:hover{

transform:translateY(-5px);

border-color:#4DEDFF;

box-shadow:
0 0 25px rgba(77,237,255,.25);

}



.stat-icon{

font-size:40px;

}



.stat-card h3{

margin:10px 0;

font-size:38px;

color:#4DEDFF;

}



.stat-card p{

color:#94A3B8;

}




.nav{

display:flex;

justify-content:center;

gap:15px;

padding:20px;

}



.tab{

padding:13px 25px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

background:#2563EB;

color:white;

transition:.25s;

}



.tab:hover{

transform:translateY(-3px);

background:#1D4ED8;

}



.tab.active{

background:#4DEDFF;

color:#07131F;

box-shadow:

0 0 20px rgba(77,237,255,.45);

}




.container{

max-width:950px;

margin:auto;

padding:20px;

}




.card{

background:
linear-gradient(
180deg,
#182435,
#111827
);

padding:22px;

border-radius:18px;

margin-top:15px;

border:1px solid rgba(77,237,255,.15);

box-shadow:

0 10px 25px rgba(0,0,0,.3);

animation:show .35s ease;

}



.card:hover{

border-color:#4DEDFF;

transform:translateY(-3px);

}



@keyframes show{

from{

opacity:0;

transform:translateY(15px);

}

to{

opacity:1;

transform:translateY(0);

}

}



.badge{

background:#4DEDFF;

color:#07131F;

padding:6px 14px;

border-radius:20px;

font-size:12px;

font-weight:bold;

}



.staff-actions{

display:flex;

gap:10px;

margin-top:15px;

}



.edit-btn,
.delete-btn{

width:45px;

height:45px;

border:none;

border-radius:50%;

cursor:pointer;

font-size:18px;

transition:.25s;

}



.edit-btn{

background:#F59E0B;

color:white;

}



.delete-btn{

background:#EF4444;

color:white;

}



.edit-btn:hover,
.delete-btn:hover{

transform:scale(1.12);

}




@media(max-width:600px){

.topbar{

flex-direction:column;

gap:15px;

text-align:center;

}


.nav{

flex-direction:column;

}


.tab{

width:100%;

}

}


</style>
<script>

let currentUser = null;

let USERS = [];

let POSTS = [];





async function login(){


const respuesta = await fetch("/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:user.value,

pass:pass.value

})

});



const data = await respuesta.json();



if(!data.success){


error.innerHTML="❌ Usuario o contraseña incorrecta";


return;


}



currentUser=data.user;



loginBox.style.display="none";


panel.classList.remove("hidden");



welcome.innerHTML="Bienvenido "+currentUser.username;


roleBadge.innerHTML=currentUser.role;



await loadAll();


show("updates");


}








function isOwner(){


return currentUser && currentUser.role==="Dueño";


}









function show(tab){


updates.classList.add("hidden");

staff.classList.add("hidden");



document.getElementById(tab).classList.remove("hidden");


}










async function loadAll(){



const usuarios = await fetch("/api/users");


USERS = await usuarios.json();




const publicaciones = await fetch("/api/posts");


POSTS = await publicaciones.json();



render();


}










function render(){



/* ESTADISTICAS */


document.getElementById("staffCount").innerHTML = USERS.length;


document.getElementById("postCount").innerHTML = POSTS.length;







/* ACTUALIZACIONES */


updates.innerHTML="";



if(isOwner()){


updates.innerHTML+=`

<div class="card">


<h3>
📢 Crear Actualización
</h3>


<input id="titulo" placeholder="Título">


<textarea id="mensaje" placeholder="Mensaje"></textarea>



<button class="green" onclick="crearPost()">

Publicar

</button>


</div>


`;

}



POSTS.forEach(post=>{


updates.innerHTML+=`

<div class="card">


<h3>

📢 ${post.titulo}

</h3>


<p>

${post.mensaje}

</p>


<small>

${post.fecha}

</small>




${isOwner()?`

<br><br>


<button class="blue"

onclick="sendDiscord(${post.id})">

🔔 Discord

</button>



<button class="delete-btn"

onclick="deletePost(${post.id})">

🗑 Borrar

</button>


`:''}



</div>

`;

});









/* STAFF */


staff.innerHTML="";



if(isOwner()){


staff.innerHTML+=`

<div class="card">


<h3>

👥 Agregar Staff

</h3>



<input id="newUser" placeholder="Usuario">


<input id="newRole" placeholder="Rango">



<button class="green" onclick="addUser()">

Agregar

</button>


</div>

`;

}



USERS.forEach(u=>{


staff.innerHTML+=`

<div class="card">



<h3>

👤 ${u.username}

</h3>



<span class="badge">

${u.role}

</span>




${isOwner()?`

<div class="staff-actions">


<button class="edit-btn"

onclick="editUser(${u.id},'${u.username}','${u.role}')">

✏️

</button>



<button class="delete-btn"

onclick="deleteUser(${u.id})">

🗑

</button>


</div>


`:''}



</div>


`;

});



}









async function addUser(){


if(!newRole.value){

alert("El rango es obligatorio");

return;

}



await fetch("/api/users",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:newUser.value,

role:newRole.value

})

});



loadAll();


}










function editUser(id,nombre,rango){


let modal=document.createElement("div");


modal.className="modal";



modal.innerHTML=`

<div class="modal-box">


<h3>
✏️ Editar Staff
</h3>



<input id="editName" value="${nombre}">


<input id="editRole" value="${rango}">



<button class="green" onclick="saveEdit(${id})">

Guardar

</button>



<button class="red" onclick="this.parentElement.parentElement.remove()">

Cancelar

</button>



</div>

`;



document.body.appendChild(modal);


}










async function saveEdit(id){


await fetch("/api/users/"+id,{

method:"PUT",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:editName.value,

role:editRole.value

})

});



document.querySelector(".modal").remove();



loadAll();


}









async function deleteUser(id){



if(!confirm("¿Eliminar usuario?"))

return;



await fetch("/api/users/"+id,{

method:"DELETE"

});



loadAll();


}









async function crearPost(){



await fetch("/api/posts",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

titulo:titulo.value,

mensaje:mensaje.value

})

});



loadAll();


}









async function deletePost(id){



if(!confirm("¿Eliminar actualización?"))

return;



await fetch("/api/posts/"+id,{

method:"DELETE"

});



loadAll();


}









async function sendDiscord(id){



const post=POSTS.find(x=>x.id===id);



await fetch("/api/webhook",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(post)

});



alert("✅ Actualización enviada a Discord");


}


</script>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Buenos Aires RP | Panel Staff</title>


<style>

*{
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;
}


body{

margin:0;

min-height:100vh;

background:
radial-gradient(circle at top,#1d4ed8,#020617 60%);

color:white;

}



/* ================= LOGIN ================= */


#loginBox{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

}



.login-card{


width:420px;


padding:40px;


background:

rgba(15,23,42,.95);


border-radius:25px;


border:1px solid rgba(255,255,255,.1);


box-shadow:

0 20px 60px rgba(0,0,0,.7);


text-align:center;


}



.logo{


width:140px;

height:140px;


border-radius:50%;


object-fit:cover;


border:4px solid #38bdf8;


box-shadow:

0 0 35px #38bdf8;


margin-bottom:20px;


}




.login-card h1{


font-size:32px;


margin:10px 0;


background:

linear-gradient(

90deg,

#38bdf8,

#818cf8

);


-webkit-background-clip:text;


color:transparent;


}




.login-card p{


color:#94a3b8;


}





input,
textarea,
select{


width:100%;


padding:14px;


margin:8px 0;


border-radius:12px;


border:1px solid #334155;


background:#020617;


color:white;


outline:none;


font-size:15px;


}



input:focus,
textarea:focus,
select:focus{


border-color:#38bdf8;


box-shadow:

0 0 10px rgba(56,189,248,.4);


}




.login-btn{


width:100%;


padding:15px;


margin-top:15px;


border-radius:15px;


border:none;


cursor:pointer;


font-weight:bold;


font-size:16px;


color:white;


background:

linear-gradient(

90deg,

#2563eb,

#38bdf8

);



box-shadow:

0 10px 30px rgba(37,99,235,.5);


transition:.3s;


}




.login-btn:hover{


transform:translateY(-3px);


}




#error{


color:#f87171;


margin-top:15px;


}



/* ================= PANEL ================= */



.hidden{

display:none!important;

}



.nav{


display:flex;


justify-content:center;


gap:20px;


padding:25px;


}



.tab{


padding:15px 35px;


border-radius:15px;


background:#1e293b;


cursor:pointer;


font-weight:bold;


border:1px solid rgba(255,255,255,.08);


transition:.3s;


}



.tab:hover{


background:#2563eb;


transform:translateY(-3px);


}





.container{


max-width:1100px;


margin:auto;


padding:20px;


}




.card{


background:

rgba(15,23,42,.95);


border-radius:20px;


padding:25px;


margin-bottom:20px;


box-shadow:

0 15px 40px rgba(0,0,0,.4);


border:1px solid rgba(255,255,255,.06);


}




button{


cursor:pointer;


border:none;


font-weight:bold;


}




.btn{


padding:12px 20px;


border-radius:12px;


}



.green{

background:#22c55e;

color:white;

}



.blue{

background:#2563eb;

color:white;

}



.red{

background:#ef4444;

color:white;

}




.circle{


width:45px;


height:45px;


border-radius:50%;


display:inline-flex;


align-items:center;


justify-content:center;


font-size:18px;


margin:5px;


color:white;


}




.badge{


padding:6px 12px;


border-radius:10px;


background:#334155;


font-size:13px;


}


</style>


</head>


<body>



<!-- LOGIN -->


<div id="loginBox">


<div class="login-card">


<img class="logo"

src="TU_LOGO_AQUI">


<h1>

Buenos Aires RP

</h1>


<p>

Panel Administrativo Staff

</p>



<input id="username"

placeholder="👤 Usuario">



<input id="password"

type="password"

placeholder="🔒 Contraseña">



<button class="login-btn"

onclick="login()">


🚀 Ingresar


</button>


<p id="error"></p>


</div>


</div>





<!-- PANEL -->


<div id="panel" class="hidden">


<div class="nav">


<div class="tab"

onclick="openTab('staff')">

👥 Staff

</div>


<div class="tab"

onclick="openTab('updates')">

📢 Actualizaciones

</div>


</div>



<div class="container">


<div id="staff"></div>


<div id="updates" class="hidden"></div>


</div>


</div>
<script>


let currentUser = null;





// ================= LOGIN =================



async function login(){


let user = username.value;

let pass = password.value;



let response = await fetch("/api/login",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

user:user,

pass:pass

})


});




let data = await response.json();




if(!data.success){


error.innerHTML="❌ Usuario o contraseña incorrectos";


return;


}




currentUser=data.user;



loginBox.style.display="none";


panel.classList.remove("hidden");



openTab("staff");


}








// ================= PESTAÑAS =================



function openTab(nombre){


staff.classList.add("hidden");


updates.classList.add("hidden");



document.getElementById(nombre).classList.remove("hidden");



if(nombre==="staff"){


cargarStaff();


}



if(nombre==="updates"){


cargarActualizaciones();


}



}









// ================= STAFF =================



async function cargarStaff(){


let res = await fetch("/api/staff");


let usuarios = await res.json();



staff.innerHTML=`


<div class="card">


<h2>

👥 Equipo Staff

</h2>


<h3>

Total Staff:

<span style="color:#38bdf8">

${usuarios.length}

</span>


</h3>


</div>



<div class="card">


<div style="display:grid;grid-template-columns:2fr 1.5fr 1fr 120px;gap:10px;font-weight:bold;">


<div>

Usuario

</div>



<div>

Rango

</div>



<div>

Actividad

</div>



<div>

Acciones

</div>


</div>


</div>


`;









usuarios.forEach(u=>{



let acciones="";




// Dueño y RRHH pueden editar


if(

currentUser.role==="Dueño" ||

currentUser.role==="Director Recursos Humanos"

){


acciones+=`


<button class="circle blue"

onclick="editarStaff(${u.id},'${u.username}','${u.role}','${u.activity}')">


✏️

</button>


`;


}




// Solo Dueño elimina


if(currentUser.role==="Dueño"){


acciones+=`


<button class="circle red"

onclick="eliminarStaff(${u.id})">


🗑️

</button>


`;

}



let actividad =

u.activity==="Activo"

?

"🟢 Activo"

:

"🔴 Inactivo";





staff.innerHTML+=`


<div class="card">


<div style="display:grid;grid-template-columns:2fr 1.5fr 1fr 120px;gap:10px;align-items:center;">



<div>

👤 ${u.username}

</div>




<div>

<span class="badge">

${u.role}

</span>

</div>



<div>

${actividad}

</div>




<div>

${acciones}

</div>



</div>


</div>


`;



});



}









// ================= EDITAR STAFF =================



async function editarStaff(id,user,role,activity){



let nuevoUsuario=prompt(

"Usuario:",

user

);



let nuevoRango=prompt(

"Rango:",

role

);



let nuevaActividad=prompt(

"Actividad (Activo/Inactivo):",

activity

);



if(!nuevoUsuario)return;




await fetch("/api/staff/"+id,{


method:"PUT",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


user:nuevoUsuario,


role:nuevoRango,


activity:nuevaActividad


})


});



cargarStaff();


}









// ================= ELIMINAR STAFF =================



async function eliminarStaff(id){


if(!confirm("¿Eliminar este miembro del Staff?"))

return;



await fetch("/api/staff/"+id,{


method:"DELETE"


});



cargarStaff();



}
  // ================= ACTUALIZACIONES =================


const WEBHOOK = "https://discord.com/api/webhooks/1520203613325103165/FENLvXQXDXN9Vg2QrqOp4HyvZwbMP6rAYyZ8hxNqKTebgzDWeYM36N7MV2AaLKkffEfq";





async function cargarActualizaciones(){



let res = await fetch("/api/posts");


let posts = await res.json();



updates.innerHTML="";






// Crear actualización


if(

currentUser.role==="Dueño" ||

currentUser.role==="Owner 2"

){


updates.innerHTML+=`


<div class="card">


<h2>

📢 Crear actualización

</h2>



<input

id="tituloUpdate"

placeholder="Título de la actualización">



<textarea

id="mensajeUpdate"

placeholder="Mensaje de la actualización">

</textarea>




<button

class="btn green"

onclick="crearActualizacion()">


📤 Publicar


</button>



</div>


`;



}







posts.forEach(post=>{



let botones="";




if(currentUser.role==="Dueño"){


botones=`


<button

class="circle blue"

onclick='enviarDiscord(${JSON.stringify(post)})'>


📨


</button>




<button

class="circle red"

onclick="eliminarActualizacion(${post.id})">


🗑️


</button>


`;


}





updates.innerHTML+=`


<div class="card">


<h2>

📢 ${post.titulo}

</h2>



<p>

${post.mensaje}

</p>



<small>

📅 ${new Date(post.fecha).toLocaleString()}

</small>



<br><br>


${botones}



</div>


`;



});



}









// ================= CREAR ACTUALIZACION =================



async function crearActualizacion(){



await fetch("/api/posts",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


titulo:

tituloUpdate.value,


mensaje:

mensajeUpdate.value


})


});



cargarActualizaciones();


}









// ================= ELIMINAR ACTUALIZACION =================



async function eliminarActualizacion(id){



if(!confirm("¿Eliminar actualización?"))

return;



await fetch("/api/posts/"+id,{


method:"DELETE"


});



cargarActualizaciones();



}









// ================= ENVIAR DISCORD =================



async function enviarDiscord(post){



await fetch(WEBHOOK,{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


username:

"Buenos Aires RP | Actualizaciones",



embeds:[{


title:

"📢 ACTUALIZACIÓN OFICIAL",



description:

`

**${post.titulo}**


${post.mensaje}

`,



color:0x2563eb,



fields:[


{

name:"🏢 Servidor",

value:"Buenos Aires RP",

inline:true

},



{

name:"👤 Publicado por",

value:currentUser.user,

inline:true

}



],



footer:{


text:

"Buenos Aires RP • Panel Staff"

},



timestamp:

new Date()


}]


})


});



alert("✅ Enviado correctamente a Discord");


}





</script>


</body>


</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buenos Aires RP | Panel</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

margin:0;

min-height:100vh;

background:
radial-gradient(circle at top,#17365F,#0B1220,#070B14);

color:white;

}

/* LOGIN */

.login{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}


.login-box{

width:390px;

padding:45px;

border-radius:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 25px 60px rgba(0,0,0,.45);

text-align:center;

}


/* LOGO */

.logo{

width:100px;

height:100px;

margin:0 auto 20px;

border-radius:50%;

overflow:hidden;

display:flex;

align-items:center;

justify-content:center;

border:2px solid rgba(77,237,255,.5);

box-shadow:
0 0 25px rgba(77,237,255,.45);

}


.logo img{

width:100%;

height:100%;

object-fit:cover;

}


/* TITULO */

h1{

margin:0;

font-size:32px;

font-weight:900;

background:linear-gradient(
90deg,
#4DEDFF,
white,
#4DEDFF
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}


.subtitle{

margin:12px 0 25px;

color:#94A3B8;

}


/* INPUTS */

input{

width:100%;

padding:14px;

margin:8px 0;

border:none;

outline:none;

border-radius:12px;

background:#0F172A;

color:white;

font-size:15px;

}


input:focus{

box-shadow:
0 0 15px rgba(77,237,255,.35);

}


/* BOTON LOGIN */

.login-btn{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:bold;

font-size:16px;

color:#06121D;

background:
linear-gradient(
90deg,
#00C6FF,
#4DEDFF
);

transition:.25s;

}


.login-btn:hover{

transform:translateY(-3px);

box-shadow:
0 0 25px rgba(77,237,255,.45);

}


#error{

color:#ef4444;

margin-top:15px;

}


.footer{

margin-top:25px;

font-size:12px;

color:#64748B;

}


/* GENERAL */

.hidden{

display:none;

}


</style>

</head>


<body>


<div id="loginBox" class="login">


<div class="login-box">


<div class="logo">

<img src="https://media.discordapp.net/attachments/1422562797148962929/1526052310005055638/ChatGPT_Image_6_jul_2026_02_46_06_p.m..png?ex=6a559e77&is=6a544cf7&hm=7a8b8dd5d5708a95848980033996c9284903d032929ffea38eb5f56bfef59152&=&format=webp&quality=lossless&width=930&height=930" alt="Buenos Aires RP">

</div>


<h1>

Buenos Aires RP

</h1>


<p class="subtitle">

Panel de Recursos Humanos

</p>


<input id="user" placeholder="👤 Usuario">


<input id="pass" type="password" placeholder="🔒 Contraseña">


<button class="login-btn" onclick="login()">

Iniciar Sesión

</button>


<p id="error"></p>


<div class="footer">

© 2026 Buenos Aires RP

</div>


</div>


</div>
<!-- PANEL PRINCIPAL -->

<div id="panel" class="hidden">


<header class="topbar">

<div>

<h2>

Buenos Aires RP

</h2>

<span id="welcome"></span>

</div>


<div>

<span id="roleBadge"></span>

</div>


</header>



<!-- ESTADISTICAS -->

<div class="stats">


<div class="stat-card">

<div class="stat-icon">
👥
</div>

<h3 id="staffCount">
0
</h3>

<p>
Personal
</p>

</div>



<div class="stat-card">

<div class="stat-icon">
📢
</div>

<h3 id="postCount">
0
</h3>

<p>
Actualizaciones
</p>

</div>


</div>





<!-- BOTONES -->

<div class="nav">


<button class="tab active" onclick="show('updates')">

📢 Actualizaciones

</button>


<button class="tab" onclick="show('staff')">

👥 Staff

</button>


</div>






<div class="container">


<!-- ACTUALIZACIONES -->


<div id="updates">


</div>





<!-- STAFF -->


<div id="staff" class="hidden">


</div>



</div>



</div>






<style>


/* PANEL */


.topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:25px;

background:rgba(17,24,39,.85);

backdrop-filter:blur(15px);

border-bottom:1px solid rgba(77,237,255,.15);

}


.topbar h2{

margin:0;

font-size:28px;

color:#4DEDFF;

}



#welcome{

color:#94A3B8;

}



#roleBadge{

background:linear-gradient(
90deg,
#00C6FF,
#4DEDFF
);

color:#06121D;

padding:8px 18px;

border-radius:30px;

font-weight:bold;

}





/* ESTADISTICAS */


.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:20px;

padding:25px;

}



.stat-card{

background:
linear-gradient(
180deg,
#182435,
#111827
);

padding:25px;

border-radius:20px;

text-align:center;

border:1px solid rgba(77,237,255,.15);

box-shadow:
0 10px 30px rgba(0,0,0,.35);

transition:.25s;

}



.stat-card:hover{

transform:translateY(-5px);

border-color:#4DEDFF;

box-shadow:
0 0 25px rgba(77,237,255,.25);

}



.stat-icon{

font-size:35px;

}



.stat-card h3{

font-size:38px;

margin:10px 0;

color:#4DEDFF;

}



.stat-card p{

color:#94A3B8;

margin:0;

}




/* NAVEGACION */


.nav{

display:flex;

justify-content:center;

gap:15px;

padding:20px;

}



.tab{

background:#2563EB;

color:white;

padding:13px 25px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

transition:.25s;

}



.tab:hover{

background:#1D4ED8;

transform:translateY(-3px);

}



.tab.active{

background:#4DEDFF;

color:#06121D;

box-shadow:

0 0 20px rgba(77,237,255,.45);

}





/* CONTENEDOR */


.container{

max-width:950px;

margin:auto;

padding:20px;

}



.card{

background:

linear-gradient(
180deg,
#182435,
#111827
);

padding:22px;

border-radius:18px;

margin-top:15px;

border:1px solid rgba(77,237,255,.15);

box-shadow:

0 10px 25px rgba(0,0,0,.3);

transition:.25s;

animation:showCard .35s ease;

}



.card:hover{

border-color:#4DEDFF;

transform:translateY(-3px);

}




@keyframes showCard{

from{

opacity:0;

transform:translateY(15px);

}

to{

opacity:1;

transform:translateY(0);

}

}





@media(max-width:600px){


.topbar{

flex-direction:column;

gap:15px;

text-align:center;

}



.nav{

flex-direction:column;

}


.tab{

width:100%;

}


}

</style>
<script>

let currentUser = null;

let USERS = [];

let POSTS = [];


// LOGIN

async function login(){


let respuesta = await fetch("/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:user.value,

pass:pass.value

})

});


let data = await respuesta.json();


if(!data.success){

error.innerText="❌ Usuario o contraseña incorrecta";

return;

}


currentUser=data.user;


loginBox.style.display="none";

panel.classList.remove("hidden");


welcome.innerText=
"Bienvenido, "+currentUser.username;


roleBadge.innerText=
currentUser.role;


await loadAll();


show("updates");


}




function isOwner(){

return currentUser && currentUser.role==="Dueño";

}





// CAMBIO DE PESTAÑA

function show(tab){


updates.classList.add("hidden");

staff.classList.add("hidden");


document.getElementById(tab)
.classList.remove("hidden");



document.querySelectorAll(".tab")
.forEach(btn=>{

btn.classList.remove("active");

});


if(tab==="updates"){

document.querySelectorAll(".tab")[0]
.classList.add("active");

}else{

document.querySelectorAll(".tab")[1]
.classList.add("active");

}


}





// CARGAR DATOS


async function loadAll(){


let usuarios =
await fetch("/api/users");


USERS =
await usuarios.json();



let publicaciones =
await fetch("/api/posts");


POSTS =
await publicaciones.json();



document.getElementById("staffCount")
.innerText=USERS.length;


document.getElementById("postCount")
.innerText=POSTS.length;



render();


}





function render(){


/* ACTUALIZACIONES */


updates.innerHTML="";


if(isOwner()){


updates.innerHTML+=`

<div class="card">

<h3>📢 Crear actualización</h3>


<input id="titulo"
placeholder="Título">


<textarea id="mensaje"
placeholder="Mensaje"></textarea>


<button class="login-btn"
onclick="crearPost()">

Publicar

</button>


</div>

`;

}



POSTS.forEach(post=>{


updates.innerHTML+=`

<div class="card">


<h3>
🚀 ${post.titulo}
</h3>


<p>
${post.mensaje}
</p>


<small>
${post.fecha}
</small>


${isOwner()?`

<br>

<button class="blue"
onclick="sendDiscord(${post.id})">

🔔 Discord

</button>


<button class="red"
onclick="deletePost(${post.id})">

🗑 Eliminar

</button>


`:''}


</div>


`;

});







/* STAFF */


staff.innerHTML="";


if(isOwner()){


staff.innerHTML+=`

<div class="card">


<h3>
👥 Agregar Staff
</h3>


<input id="newUser"
placeholder="Nombre">


<input id="newRole"
placeholder="Rango">


<button class="login-btn"
onclick="addUser()">

Agregar

</button>


</div>

`;

}



USERS.forEach(u=>{


staff.innerHTML+=`

<div class="card">


<h3>

👤 ${u.username}

<span class="badge">

${u.role}

</span>


</h3>



${isOwner()?`

<button class="blue"

onclick="editUser(${u.id},'${u.username}','${u.role}')">

✏️ Editar

</button>


<button class="red"

onclick="deleteUser(${u.id})">

🗑 Eliminar

</button>


`:''}



</div>

`;

});


}







// AGREGAR STAFF


async function addUser(){


if(!newRole.value){

alert("El rango es obligatorio");

return;

}



await fetch("/api/users",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:newUser.value,

role:newRole.value

})

});


loadAll();


}







// EDITAR STAFF


function editUser(id,nombre,rango){


let nuevoNombre=
prompt("Nombre:",nombre);


let nuevoRango=
prompt("Rango:",rango);



if(!nuevoRango)return;



saveEdit(id,nuevoNombre,nuevoRango);


}





async function saveEdit(id,nombre,rango){


await fetch("/api/users/"+id,{

method:"PUT",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:nombre,

role:rango

})

});


loadAll();


}







// ELIMINAR STAFF


async function deleteUser(id){


if(!confirm("¿Eliminar usuario?"))
return;



await fetch("/api/users/"+id,{

method:"DELETE"

});


loadAll();


}







// CREAR ACTUALIZACION


async function crearPost(){


await fetch("/api/posts",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

titulo:titulo.value,

mensaje:mensaje.value

})

});


loadAll();


}







// ELIMINAR ACTUALIZACION


async function deletePost(id){


if(!confirm("¿Eliminar actualización?"))
return;



await fetch("/api/posts/"+id,{

method:"DELETE"

});


loadAll();


}







// ENVIAR A DISCORD


async function sendDiscord(id){


let post =
POSTS.find(x=>x.id===id);



await fetch("/api/webhook",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(post)

});


alert("✅ Actualización enviada a Discord");


}


</script>

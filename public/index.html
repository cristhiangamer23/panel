<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buenos Aires RP | Panel Staff</title>


<style>


*{

box-sizing:border-box;

font-family:'Segoe UI',Arial,sans-serif;

}



body{

margin:0;

min-height:100vh;

background:

radial-gradient(circle at top,#2563eb,#020617 65%);

color:white;

}



/* LOGIN */


#loginBox{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}



.login-card{


width:420px;


padding:40px;


background:rgba(15,23,42,.95);


border-radius:25px;


text-align:center;


border:1px solid rgba(255,255,255,.1);


box-shadow:0 20px 60px rgba(0,0,0,.7);


}



.logo{


width:130px;


height:130px;


border-radius:50%;


object-fit:cover;


border:4px solid #38bdf8;


box-shadow:0 0 30px #38bdf8;


}



.login-card h1{


font-size:32px;


margin:20px 0 5px;


background:linear-gradient(90deg,#38bdf8,#818cf8);


-webkit-background-clip:text;


color:transparent;


}



.login-card p{


color:#94a3b8;


}



input,
textarea,
select{


width:100%;


padding:14px;


margin-top:10px;


background:#020617;


border:1px solid #334155;


border-radius:12px;


color:white;


outline:none;


}



textarea{


min-height:120px;


resize:none;


}




input:focus,
textarea:focus{


border-color:#38bdf8;


}



.login-btn{


width:100%;


margin-top:15px;


padding:15px;


border:none;


border-radius:15px;


background:linear-gradient(90deg,#2563eb,#38bdf8);


color:white;


font-weight:bold;


font-size:16px;


cursor:pointer;


}



#error{


color:#f87171;


}



/* PANEL */


.hidden{

display:none!important;

}



.nav{


display:flex;


justify-content:center;


gap:20px;


padding:25px;


}



.tab{


background:#1e293b;


padding:15px 35px;


border-radius:15px;


cursor:pointer;


font-weight:bold;


transition:.3s;


border:1px solid rgba(255,255,255,.1);


}



.tab:hover{


background:#2563eb;


transform:translateY(-3px);


}




.container{


max-width:1100px;


margin:auto;


padding:20px;


}



.card{


background:rgba(15,23,42,.95);


border-radius:20px;


padding:25px;


margin-bottom:20px;


border:1px solid rgba(255,255,255,.08);


box-shadow:0 15px 40px rgba(0,0,0,.4);


}



.btn{


padding:12px 20px;


border:none;


border-radius:12px;


cursor:pointer;


font-weight:bold;


}



.green{

background:#22c55e;

color:white;

}



.blue{

background:#2563eb;

color:white;

}



.red{

background:#ef4444;

color:white;

}




.circle{


width:45px;


height:45px;


border-radius:50%;


border:none;


cursor:pointer;


color:white;


margin:5px;


}



.badge{


padding:6px 12px;


border-radius:10px;


background:#334155;


font-size:13px;


}


</style>


</head>


<body>



<!-- LOGIN -->


<div id="loginBox">


<div class="login-card">


<img class="logo" src="https://media.discordapp.net/attachments/1422562797148962929/1524142130363371682/buenos_Aires_RP.png?ex=6a569479&is=6a5542f9&hm=dbf53183c13fb57c127c9b5c0621dfd3a675276ae14116ed2db93257ddee2549&=&format=webp&quality=lossless&width=930&height=930">


<h1>

BUENOS AIRES RP

</h1>


<p>

Panel Administrativo Staff

</p>



<input id="username" placeholder="👤 Usuario">


<input id="password" type="password" placeholder="🔒 Contraseña">


<button class="login-btn" onclick="login()">

🚀 Ingresar

</button>


<p id="error"></p>


</div>


</div>





<!-- PANEL -->


<div id="panel" class="hidden">



<div class="nav">


<div class="tab" onclick="openTab('staff')">

👥 Staff

</div>



<div class="tab" onclick="openTab('updates')">

📢 Actualizaciones

</div>



</div>





<div class="container">


<div id="staff"></div>


<div id="updates" class="hidden"></div>


</div>



</div>
<script>


let currentUser = null;




// ================= LOGIN =================



async function login(){



let usuario = document.getElementById("username").value;

let contraseña = document.getElementById("password").value;




let respuesta = await fetch("/api/login",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


user:usuario,


pass:contraseña


})


});




let datos = await respuesta.json();




if(!datos.success){


document.getElementById("error").innerHTML =

"❌ Usuario o contraseña incorrectos";


return;


}





currentUser = datos.user;




document.getElementById("loginBox").style.display="none";


document.getElementById("panel").classList.remove("hidden");



openTab("staff");



}







// ================= CAMBIO DE PESTAÑA =================



function openTab(tab){



document.getElementById("staff").classList.add("hidden");


document.getElementById("updates").classList.add("hidden");



document.getElementById(tab).classList.remove("hidden");




if(tab==="staff"){


cargarStaff();


}



if(tab==="updates"){


cargarActualizaciones();


}



}









// ================= CARGAR STAFF =================



async function cargarStaff(){



let respuesta = await fetch("/api/staff");


let staff = await respuesta.json();





document.getElementById("staff").innerHTML = `


<div class="card">


<h2>

👥 Equipo Staff

</h2>



<h3>

Total:

<span style="color:#38bdf8">

${staff.length}

</span>


</h3>


</div>



`;






staff.forEach(persona=>{



let botones="";




// Dueño y Director RRHH pueden editar


if(

currentUser.role==="Dueño" ||

currentUser.role==="Director Recursos Humanos"

){



botones += `


<button class="circle blue"

onclick="editarStaff(

${persona.id},

'${persona.username}',

'${persona.role}',

'${persona.activity}'

)">

✏️

</button>


`;



}




// Solo Dueño elimina


if(currentUser.role==="Dueño"){


botones += `


<button class="circle red"

onclick="eliminarStaff(${persona.id})">

🗑️

</button>


`;



}





let estado = persona.activity==="Activo"

?

"🟢 Activo"

:

"🔴 Inactivo";







document.getElementById("staff").innerHTML += `



<div class="card">


<h3>

👤 ${persona.username}

</h3>



<p>

Rango:

<span class="badge">

${persona.role}

</span>

</p>




<p>

Estado:

${estado}

</p>



<div>

${botones}

</div>



</div>


`;




});



}









// ================= EDITAR STAFF =================



async function editarStaff(id,usuario,rango,estado){



let nuevoUsuario = prompt(

"Nuevo usuario:",

usuario

);



let nuevoRango = prompt(

"Nuevo rango:",

rango

);



let nuevoEstado = prompt(

"Estado:",

estado

);




if(!nuevoUsuario) return;





await fetch("/api/staff/"+id,{



method:"PUT",



headers:{


"Content-Type":"application/json"


},



body:JSON.stringify({



user:nuevoUsuario,


role:nuevoRango,


activity:nuevoEstado



})



});





cargarStaff();



}









// ================= ELIMINAR STAFF =================



async function eliminarStaff(id){



if(!confirm(

"¿Eliminar miembro del Staff?"

)) return;




await fetch("/api/staff/"+id,{



method:"DELETE"



});




cargarStaff();



}
// ================= ACTUALIZACIONES =================



async function cargarActualizaciones(){



let respuesta = await fetch("/api/posts");


let publicaciones = await respuesta.json();




let contenedor = document.getElementById("updates");



contenedor.innerHTML="";







// CREAR ACTUALIZACION



if(

currentUser.role==="Dueño" ||

currentUser.role==="Owner 2"

){



contenedor.innerHTML += `



<div class="card">


<h2>

📢 Crear actualización

</h2>




<input

id="tituloUpdate"

placeholder="📌 Título de la actualización">






<textarea

id="mensajeUpdate"

placeholder="💬 Escribe el mensaje de la actualización">

</textarea>






<input

id="imagenUpdate"

placeholder="🖼️ URL de imagen (opcional)">






<button

class="btn green"

onclick="crearActualizacion()">


📤 Publicar actualización

</button>



</div>


`;



}









// LISTAR ACTUALIZACIONES



publicaciones.forEach(post=>{



let acciones="";





if(currentUser.role==="Dueño"){



acciones = `



<button

class="circle blue"

onclick='enviarDiscord(${JSON.stringify(post)})'>


📨

</button>





<button

class="circle red"

onclick="eliminarActualizacion(${post.id})">


🗑️

</button>



`;



}







contenedor.innerHTML += `



<div class="card">



<h2>

📢 ${post.titulo}

</h2>





<p>

${post.mensaje}

</p>






${
post.imagen

?

`<img src="${post.imagen}" width="100%" style="border-radius:15px;margin-top:15px;">`

:

""

}







<small>

📅 ${new Date(post.fecha).toLocaleString()}

</small>






<br><br>



${acciones}



</div>



`;



});



}











// ================= CREAR ACTUALIZACION =================



async function crearActualizacion(){



let titulo = document.getElementById("tituloUpdate").value;


let mensaje = document.getElementById("mensajeUpdate").value;


let imagen = document.getElementById("imagenUpdate").value;





if(!titulo || !mensaje){



alert("Completa el título y mensaje");


return;


}






await fetch("/api/posts",{


method:"POST",



headers:{


"Content-Type":"application/json"


},



body:JSON.stringify({


titulo,


mensaje,


imagen


})



});






// Enviar automáticamente a Discord


await enviarDiscord({


titulo,


mensaje,


imagen,


fecha:new Date()


});






alert("✅ Actualización publicada correctamente");



cargarActualizaciones();



}









// ================= ELIMINAR ACTUALIZACION =================



async function eliminarActualizacion(id){



if(!confirm(

"¿Eliminar actualización?"

)) return;





await fetch("/api/posts/"+id,{


method:"DELETE"


});





cargarActualizaciones();



}
// ================= DISCORD WEBHOOK =================



const WEBHOOK = "https://discord.com/api/webhooks/1520203613325103165/FENLvXQXDXN9Vg2QrqOp4HyvZwbMP6rAYyZ8hxNqKTebgzDWeYM36N7MV2AaLKkffEfq";


const LOGO_BOT = "https://media.discordapp.net/attachments/1422562797148962929/1524142130363371682/buenos_Aires_RP.png?ex=6a569479&is=6a5542f9&hm=dbf53183c13fb57c127c9b5c0621dfd3a675276ae14116ed2db93257ddee2549&=&format=webp&quality=lossless&width=930&height=930";


const ID_ROL = "1422554178772795562";









// ================= ENVIAR ACTUALIZACION A DISCORD =================



async function enviarDiscord(post){



let embed = {



author:{


name:

"Buenos Aires RP | Actualizaciones",


icon_url:

LOGO_BOT


},




title:

post.titulo,





description:

post.mensaje,





color:

0x38bdf8,





footer:{


text:

"Buenos Aires RP | Actualizaciones"


},




timestamp:

new Date(post.fecha || Date.now())



};







if(post.imagen){



embed.image = {


url:post.imagen


};



}








await fetch(WEBHOOK,{



method:"POST",



headers:{


"Content-Type":"application/json"


},



body:JSON.stringify({



content:

ID_ROL

?

`<@&${ID_ROL}>`

:

"",





username:

"Buenos Aires RP | Actualizaciones",




avatar_url:

LOGO_BOT,






embeds:[embed]



})



});



}









// ================= CARGAR PANEL =================



window.onload=()=>{


console.log(

"Buenos Aires RP | Actualizaciones iniciado correctamente"

);


};



</script>


</body>

</html>

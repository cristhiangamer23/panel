<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Buenos Aires RP | Panel Staff</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:'Segoe UI',Arial,sans-serif;

background:
linear-gradient(135deg,#020617,#0f172a);

color:white;

}



/* ================= LOGIN ================= */


.login{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}



.login-box{


width:400px;

padding:35px;


background:

rgba(15,23,42,.95);



border-radius:25px;


box-shadow:

0 20px 60px rgba(0,0,0,.6);



text-align:center;


}




.logo{


width:130px;

height:130px;


border-radius:50%;


object-fit:cover;


border:4px solid #38bdf8;


margin-bottom:15px;


}




.login-box h1{

margin:5px;

}



.login-box p{

color:#94a3b8;

}



input,
textarea,
select{


width:100%;


padding:14px;


margin:8px 0;


border-radius:12px;


border:none;


outline:none;


background:#020617;


color:white;


font-size:15px;


}





button{


border:none;


cursor:pointer;


font-weight:bold;


transition:.2s;


}




button:hover{


transform:scale(1.05);


}



.btn{


padding:12px 20px;


border-radius:12px;


}



.green{


background:#22c55e;


color:white;


}



.blue{


background:#2563eb;


color:white;


}



.red{


background:#ef4444;


color:white;


}




.hidden{


display:none;


}





#error{


color:#f87171;


margin-top:10px;


}







/* ================= PANEL ================= */


.nav{


display:flex;


justify-content:center;


gap:15px;


padding:25px;


}



.tab{


background:#1e293b;


padding:14px 30px;


border-radius:15px;


cursor:pointer;


transition:.2s;


}



.tab:hover{


background:#334155;


}




.container{


max-width:1100px;


margin:auto;


padding:20px;


}





.card{


background:

rgba(15,23,42,.9);


padding:25px;


border-radius:20px;


margin-bottom:20px;


box-shadow:

0 10px 30px rgba(0,0,0,.3);


}





.circle{


width:42px;


height:42px;


border-radius:50%;


display:inline-flex;


align-items:center;


justify-content:center;


color:white;


margin-left:5px;


}



</style>


</head>


<body>




<!-- ================= LOGIN ================= -->


<div id="loginBox" class="login">



<div class="login-box">



<img class="logo"

src="TU_LOGO_AQUI">



<h1>

Buenos Aires RP

</h1>



<p>

Panel Administrativo Staff

</p>




<input

id="username"

placeholder="Usuario">





<input

id="password"

type="password"

placeholder="Contraseña">






<button

class="btn green"

onclick="login()">


Ingresar


</button>





<p id="error"></p>



</div>


</div>







<!-- ================= PANEL ================= -->


<div id="panel" class="hidden">



<div class="nav">


<div class="tab"

onclick="openTab('staff')">


👥 Staff


</div>



<div class="tab"

onclick="openTab('updates')">


📢 Actualizaciones


</div>



</div>




<div class="container">


<div id="staff"></div>


<div id="updates" class="hidden"></div>



</div>



</div>
<script>

let currentUser = null;



// ================= LOGIN =================


async function login(){


let res = await fetch("/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user:username.value,

pass:password.value

})

});



let data = await res.json();



if(!data.success){


error.innerHTML="❌ Usuario o contraseña incorrectos";

return;


}



currentUser=data.user;



loginBox.style.display="none";


panel.classList.remove("hidden");



openTab("staff");


}






// ================= NAVEGACION =================


function openTab(tab){


staff.classList.add("hidden");

updates.classList.add("hidden");



document
.getElementById(tab)
.classList.remove("hidden");



if(tab==="staff"){

loadStaff();

}



if(tab==="updates"){

loadUpdates();

}



}








// ================= STAFF =================



async function loadStaff(){


let res = await fetch("/api/staff");


let users = await res.json();



staff.innerHTML="";




// Solo Dueño agrega Staff


if(currentUser.role==="Dueño"){


staff.innerHTML+=`

<div class="card">


<h2>
➕ Agregar Staff
</h2>



<input id="newUser"

placeholder="Usuario">


<input id="newRole"

placeholder="Rango">



<select id="newActivity">


<option value="Activo">

🟢 Activo

</option>


<option value="Inactivo">

🔴 Inactivo

</option>


</select>




<button class="btn green"

onclick="addStaff()">


Agregar Staff


</button>



</div>

`;

}





staff.innerHTML+=`

<div class="card">


<div style="display:grid;
grid-template-columns:1fr 1fr 220px;
font-weight:bold;
padding:15px;">


<div>

Usuario

</div>



<div>

Rango

</div>



<div>

Actividad

</div>



</div>



</div>

`;






users.forEach(u=>{


let botones="";



// Dueño puede todo

if(currentUser.role==="Dueño"){


botones=`

<button class="circle blue"

onclick="editStaff(${u.id})">

✏️

</button>



<button class="circle red"

onclick="deleteStaff(${u.id})">

🗑️

</button>


`;

}



// Director RRHH puede cambiar actividad

else if(
currentUser.role==="Director Recursos Humanos"
){


botones=`

<button class="circle blue"

onclick="changeActivity(${u.id})">

🔄

</button>

`;

}




staff.innerHTML+=`

<div class="card">


<div style="display:grid;
grid-template-columns:1fr 1fr 220px;
align-items:center;">



<div>

👤 ${u.user}

</div>



<div>

${u.role}

</div>




<div>


<span style="

padding:8px 15px;

border-radius:20px;

background:${u.activity==="Activo"?
"#14532d":"#7f1d1d"};

color:white;

">

${u.activity==="Activo"?

"🟢 Activo":

"🔴 Inactivo"}

</span>



${botones}



</div>



</div>



</div>

`;



});


}







// ================= AGREGAR STAFF =================



async function addStaff(){



await fetch("/api/staff",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


user:newUser.value,


role:newRole.value,


activity:newActivity.value


})


});



loadStaff();



}








// ================= EDITAR STAFF =================



async function editStaff(id){



let usuario =
prompt("Nuevo usuario");



let rango =
prompt("Nuevo rango");



if(!usuario || !rango)
return;



await fetch("/api/staff/"+id,{


method:"PUT",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


user:usuario,


role:rango,


activity:"Activo"


})


});



loadStaff();



}







// ================= CAMBIAR ACTIVIDAD =================



async function changeActivity(id){



let actividad =
prompt(

"Escribe: Activo o Inactivo"

);



if(
actividad!=="Activo" &&
actividad!=="Inactivo"
)
return;



let res =
await fetch("/api/staff");



let users =
await res.json();



let usuario =
users.find(x=>x.id===id);



await fetch("/api/staff/"+id,{


method:"PUT",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


user:usuario.user,


role:usuario.role,


activity:actividad


})


});



loadStaff();


}








// ================= ELIMINAR STAFF =================



async function deleteStaff(id){


if(!confirm("¿Eliminar este Staff?"))

return;



await fetch("/api/staff/"+id,{

method:"DELETE"

});



loadStaff();


}
  // ================= ACTUALIZACIONES =================


const WEBHOOK = "TU_WEBHOOK_DISCORD_AQUI";





async function loadUpdates(){


let res = await fetch("/api/posts");


let posts = await res.json();



updates.innerHTML="";




// Dueño y Owner 2 pueden crear actualizaciones


if(
currentUser.role==="Dueño" ||
currentUser.role==="Owner 2"
){


updates.innerHTML+=`

<div class="card">


<h2>

📢 Crear actualización oficial

</h2>



<input id="postTitle"

placeholder="Título de la actualización">



<textarea id="postMessage"

placeholder="Mensaje">

</textarea>



<button class="btn green"

onclick="createPost()">


📤 Publicar


</button>



</div>

`;

}




posts.forEach(p=>{


let botones="";



// Solo Dueño puede enviar y eliminar


if(currentUser.role==="Dueño"){


botones=`

<br><br>


<button class="circle blue"

onclick='sendDiscord(${JSON.stringify(p)})'>


📨


</button>



<button class="circle red"

onclick="deletePost(${p.id})">


🗑️


</button>


`;

}




updates.innerHTML+=`

<div class="card">


<h2>

📢 ${p.titulo}

</h2>



<p>

${p.mensaje}

</p>



<small>

📅 ${new Date(p.fecha).toLocaleString()}

</small>



${botones}



</div>

`;



});



}







// ================= CREAR POST =================



async function createPost(){



await fetch("/api/posts",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


titulo:postTitle.value,


mensaje:postMessage.value


})


});



loadUpdates();



}








// ================= ELIMINAR POST =================



async function deletePost(id){



if(!confirm("¿Eliminar actualización?"))

return;



await fetch("/api/posts/"+id,{


method:"DELETE"


});



loadUpdates();



}








// ================= ENVIAR DISCORD =================



async function sendDiscord(post){



await fetch(WEBHOOK,{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({



username:

"Buenos Aires RP | Noticias",




embeds:[{


title:

"📢 ACTUALIZACIÓN OFICIAL",



description:

`
**${post.titulo}**

${post.mensaje}
`,



color:

5793266,



fields:[



{

name:"🏢 Servidor",

value:"Buenos Aires RP",

inline:true

},



{

name:"👤 Publicado por",

value:currentUser.user,

inline:true

}



],



footer:{


text:

"Buenos Aires RP • Panel Staff"



},



timestamp:

new Date()


}]



})


});




alert("✅ Actualización enviada a Discord");


}






</script>


</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buenos Aires RP | Panel</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:
radial-gradient(circle at top,#17365F,#0B1220,#070B14);
color:white;
overflow-x:hidden;
}

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{

width:390px;
max-width:100%;

padding:45px;

border-radius:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

box-shadow:0 25px 60px rgba(0,0,0,.45);

text-align:center;

}

.logo{

width:95px;
height:95px;

margin:auto auto 20px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:rgba(255,255,255,.08);

border:2px solid rgba(77,237,255,.35);

box-shadow:0 0 25px rgba(77,237,255,.35);

overflow:hidden;

}

.logo img{

width:100%;
height:100%;

object-fit:cover;

border-radius:50%;

}

h1{

margin:0;

font-size:32px;

font-weight:800;

color:white;

}

.subtitle{

margin:10px 0 25px;

color:#AAB7C4;

}

.login-btn{

width:100%;

padding:15px;

margin-top:18px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:bold;

cursor:pointer;

color:#06121D;

background:linear-gradient(90deg,#00C6FF,#4DEDFF);

transition:.25s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 20px rgba(77,237,255,.45);

}

.footer{

margin-top:28px;

font-size:12px;

color:#7E8B99;

}

.login-box p{
color:#cbd5e1;
margin-top:8px;
margin-bottom:22px;
font-size:15px;
}

input,
textarea{

width:100%;

padding:12px;

margin:7px 0;

border:none;

border-radius:10px;

outline:none;

background:#0f172a;

color:white;

transition:.25s;

}

input:focus,
textarea:focus{

border:1px solid #4DEDFF;

box-shadow:0 0 12px rgba(77,237,255,.25);

}

textarea{

height:120px;

resize:none;

}

button{

padding:10px 15px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

}

.green{
background:#22c55e;
color:white;
}

.red{
background:#ef4444;
color:white;
}

.blue{
background:#2563eb;
color:white;
}

.hidden{
display:none;
}

.nav{
display:flex;
justify-content:center;
gap:10px;
padding:20px;
flex-wrap:wrap;
}

.tab{
background:#1f2937;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.tab:hover{
background:#334155;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(17,24,39,.9);
padding:20px;
border-radius:14px;
margin-top:15px;
}

.user{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.badge{
background:#334155;
padding:5px 10px;
border-radius:8px;
font-size:12px;
}

.actions{
display:flex;
gap:8px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.modal-box{
background:#111827;
width:350px;
max-width:100%;
padding:25px;
border-radius:15px;
}

@media(max-width:600px){

h1{
font-size:28px;
}

.logo{
width:80px;
height:80px;
}

.nav{
flex-direction:column;
}

.tab{
text-align:center;
}

.user{
flex-direction:column;
align-items:stretch;
}

.actions button{
width:100%;
}

}

  .topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:25px;

background:#111827;

border-bottom:1px solid #293548;

}

.topbar h2{

margin:0;

font-size:28px;

color:#4DEDFF;

}

#welcome{

color:#94A3B8;

}

#roleBadge{

background:#4DEDFF;

color:#07131F;

padding:8px 16px;

border-radius:25px;

font-weight:bold;

}

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

padding:25px;

}

.stat-card{

background:#111827;

padding:25px;

border-radius:18px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,.3);

transition:.25s;

}

.stat-card:hover{

transform:translateY(-5px);

}

.stat-card h3{

font-size:34px;

margin:0;

color:#4DEDFF;

}

.stat-card p{

margin-top:10px;

color:#94A3B8;

}

.green h3{

color:#22C55E;

}
  
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="login">

<div class="login-box">

<div class="logo">

<img
src="https://media.discordapp.net/attachments/1422562797148962929/1524142130363371682/buenos_Aires_RP.png?ex=6a5542f9&is=6a53f179&hm=41331dc1ae4d44f399e1f1d48918c1333f686632b24f94e1da4f6901f1b7b91f&=&format=webp&quality=lossless&width=930&height=930"
alt="Buenos Aires RP">

</div>

<h1>Buenos Aires RP</h1>

<p class="subtitle">
Panel de Recursos Humanos
</p>

<input
id="user"
placeholder="👤 Usuario">

<input
id="pass"
type="password"
placeholder="🔒 Contraseña">

<button
class="login-btn"
onclick="login()">

Iniciar Sesión

</button>

<p id="error"></p>

<div class="footer">

© 2026 Buenos Aires RP

</div>

</div>

</div>

<!-- PANEL -->

<div id="panel" class="hidden">

<header class="topbar">

<div>

<h2>Buenos Aires RP</h2>

<span id="welcome"></span>

</div>

<div>

<span id="roleBadge"></span>

</div>

</header>

<div class="stats">

<div class="stat-card">

<h3 id="staffCount">0</h3>

<p>👥 Personal</p>

</div>

<div class="stat-card">

<h3 id="postCount">0</h3>

<p>📢 Actualizaciones</p>

</div>

<div class="stat-card">

<h3 id="adminCount">0</h3>

<p>👑 Administradores</p>

</div>

<div class="stat-card green">

<h3>ONLINE</h3>

<p>Sistema</p>

</div>

</div>

<div class="nav">

<button class="tab active" onclick="show('updates')">

📢 Actualizaciones

</button>

<button class="tab" onclick="show('staff')">

👥 Staff

</button>

</div>

<div class="container">

<div id="updates"></div>

<div id="staff" class="hidden"></div>

</div>

</div>

<script>

let currentUser=null;

let USERS=[];

let POSTS=[];


async function login(){


let respuesta = await fetch("/api/login",{


method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

user:user.value,

pass:pass.value

})


});



let data = await respuesta.json();




if(!data.success){


error.innerText="❌ Usuario o contraseña incorrecta";


return;


}




currentUser=data.user;



loginBox.style.display="none";


panel.classList.remove("hidden");



await loadAll();



show("updates");



}







function isOwner(){


return currentUser && currentUser.role==="Dueño";


}







function show(tab){


updates.classList.add("hidden");

staff.classList.add("hidden");



document.getElementById(tab).classList.remove("hidden");



}







async function loadAll(){



let usuarios = await fetch("/api/users");


USERS = await usuarios.json();




let publicaciones = await fetch("/api/posts");


POSTS = await publicaciones.json();




render();


}








function render(){

welcome.innerText="Conectado como "+currentUser.username;

roleBadge.innerText=currentUser.role;

staffCount.innerText=USERS.length;

postCount.innerText=POSTS.length;

adminCount.innerText=USERS.filter(x=>x.role==="Dueño").length;

  
// ======================

// ACTUALIZACIONES

// ======================



updates.innerHTML="";




if(isOwner()){



updates.innerHTML+=`

<div class="card">


<h3>📢 Crear actualización</h3>


<input id="titulo" placeholder="Título">


<textarea id="mensaje" placeholder="Mensaje"></textarea>



<button class="green" onclick="crearPost()">

Publicar

</button>



</div>


`;



}






POSTS.forEach(post=>{


updates.innerHTML+=`

<div class="card">


<h3>${post.titulo}</h3>


<p>${post.mensaje}</p>


<small>${post.fecha}</small>




${isOwner()?`

<br><br>


<button class="blue" onclick="sendDiscord(${post.id})">

🔔 Discord

</button>



<button class="red" onclick="deletePost(${post.id})">

🗑 Eliminar

</button>



`:''}



</div>


`;



});









// ======================

// STAFF

// ======================



staff.innerHTML="";






if(isOwner()){



staff.innerHTML+=`

<div class="card">


<h3>👥 Agregar Staff</h3>



<input id="newUser" placeholder="Nombre (opcional)">



<input id="newRole" placeholder="Rango obligatorio">



<button class="green" onclick="addUser()">

Agregar

</button>



</div>



`;



}






USERS.forEach(u=>{



staff.innerHTML+=`

<div class="card user">



<div>


👤 ${u.username}


<span class="badge">

${u.role}

</span>


</div>




${isOwner()?`


<div class="actions">


<button class="blue"

onclick="editUser(${u.id},'${u.username}','${u.role}')">

✏️

</button>



<button class="red"

onclick="deleteUser(${u.id})">

🗑

</button>



</div>



`:''}



</div>


`;



});



}









async function addUser(){



if(!newRole.value){


alert("El rango es obligatorio");


return;


}




await fetch("/api/users",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

user:newUser.value,

role:newRole.value

})


});



loadAll();


}
  function editUser(id,nombre,rango){


let modal=document.createElement("div");


modal.className="modal";



modal.innerHTML=`

<div class="modal-box">


<h3>✏️ Editar Staff</h3>



<input id="editName" value="${nombre}" placeholder="Nombre">



<input id="editRole" value="${rango}" placeholder="Rango">



<button class="green" onclick="saveEdit(${id})">

Guardar

</button>



<button class="red" onclick="this.closest('.modal').remove()">

Cancelar

</button>



</div>


`;



document.body.appendChild(modal);


}








async function saveEdit(id){



let nombre=document.getElementById("editName").value;


let rango=document.getElementById("editRole").value;




if(!rango){


alert("El rango es obligatorio");


return;


}





let respuesta = await fetch("/api/users/"+id,{


method:"PUT",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


user:nombre,

role:rango


})


});



let data=await respuesta.json();




if(!data.success){


alert("Error al actualizar");


return;


}





let modal=document.querySelector(".modal");


if(modal){


modal.remove();


}



loadAll();


}








async function deleteUser(id){



if(!confirm("¿Eliminar usuario?")) return;




await fetch("/api/users/"+id,{


method:"DELETE"


});



loadAll();


}









async function crearPost(){



await fetch("/api/posts",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


titulo:titulo.value,

mensaje:mensaje.value


})


});



loadAll();


}








async function deletePost(id){



if(!confirm("¿Eliminar actualización?")) return;




await fetch("/api/posts/"+id,{


method:"DELETE"


});



loadAll();


}








async function sendDiscord(id){



let post = POSTS.find(x=>x.id===id);



await fetch("/api/webhook",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify(post)


});



alert("✅ Actualización enviada a Discord");


}






</script>


</body>


</html>

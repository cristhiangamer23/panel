<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buenos Aires RP | Panel</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0b1220,#0f172a);
color:white;
}

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:360px;
max-width:100%;
padding:30px;
border-radius:16px;
background:rgba(17,24,39,.95);
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.35);
}

.logo-title{

margin:0;

font-size:34px;

font-weight:900;

letter-spacing:1.5px;

font-family:
"Segoe UI",
"Trebuchet MS",
Arial,
sans-serif;

background:linear-gradient(
90deg,
#4DEDFF,
#FFFFFF,
#4DEDFF
);

background-size:200% auto;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:
0 0 12px rgba(77,237,255,.45);

animation:shine 4s linear infinite;

}

@keyframes shine{

0%{
background-position:0% center;
}

100%{
background-position:200% center;
}

}

.login-box p{
color:#cbd5e1;
margin-top:8px;
margin-bottom:22px;
font-size:15px;
}

input,
textarea{

width:100%;

padding:12px;

margin:7px 0;

border:none;

border-radius:10px;

outline:none;

background:#0f172a;

color:white;

transition:.25s;

}

input:focus,
textarea:focus{

border:1px solid #4DEDFF;

box-shadow:0 0 12px rgba(77,237,255,.25);

}

textarea{

height:120px;

resize:none;

}

button{

padding:10px 15px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

}

.green{
background:#22c55e;
color:white;
}

.red{
background:#ef4444;
color:white;
}

.blue{
background:#2563eb;
color:white;
}

.hidden{
display:none;
}

.nav{
display:flex;
justify-content:center;
gap:10px;
padding:20px;
flex-wrap:wrap;
}

.tab{
background:#1f2937;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.tab:hover{
background:#334155;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(17,24,39,.9);
padding:20px;
border-radius:14px;
margin-top:15px;
}

.user{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.badge{
background:#334155;
padding:5px 10px;
border-radius:8px;
font-size:12px;
}

.actions{
display:flex;
gap:8px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.modal-box{
background:#111827;
width:350px;
max-width:100%;
padding:25px;
border-radius:15px;
}

@media(max-width:600px){

.logo-title{
font-size:28px;
}

.nav{
flex-direction:column;
}

.tab{
text-align:center;
}

.user{
flex-direction:column;
align-items:stretch;
}

.actions button{
width:100%;
}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="login">

<div class="login-box">

<h2 class="logo-title">
🇦🇷 Buenos Aires RP
</h2>

<p>Panel Staff</p>

<input id="user" placeholder="Usuario">

<input id="pass" type="password" placeholder="Contraseña">

<button class="green" onclick="login()">
Entrar
</button>

<p id="error" style="color:red;"></p>

</div>

</div>

<!-- PANEL -->

<div id="panel" class="hidden">

<div class="nav">

<div class="tab" onclick="show('updates')">
📢 Actualizaciones
</div>

<div class="tab" onclick="show('staff')">
👥 Staff
</div>

</div>

<div class="container">

<div id="updates"></div>

<div id="staff" class="hidden"></div>

</div>

</div>

<script>

let currentUser=null;

let USERS=[];

let POSTS=[];


async function login(){


let respuesta = await fetch("/api/login",{


method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

user:user.value,

pass:pass.value

})


});



let data = await respuesta.json();




if(!data.success){


error.innerText="❌ Usuario o contraseña incorrecta";


return;


}




currentUser=data.user;



loginBox.style.display="none";


panel.classList.remove("hidden");



await loadAll();



show("updates");



}







function isOwner(){


return currentUser && currentUser.role==="Dueño";


}







function show(tab){


updates.classList.add("hidden");

staff.classList.add("hidden");



document.getElementById(tab).classList.remove("hidden");



}







async function loadAll(){



let usuarios = await fetch("/api/users");


USERS = await usuarios.json();




let publicaciones = await fetch("/api/posts");


POSTS = await publicaciones.json();




render();


}








function render(){



// ======================

// ACTUALIZACIONES

// ======================



updates.innerHTML="";




if(isOwner()){



updates.innerHTML+=`

<div class="card">


<h3>📢 Crear actualización</h3>


<input id="titulo" placeholder="Título">


<textarea id="mensaje" placeholder="Mensaje"></textarea>



<button class="green" onclick="crearPost()">

Publicar

</button>



</div>


`;



}






POSTS.forEach(post=>{


updates.innerHTML+=`

<div class="card">


<h3>${post.titulo}</h3>


<p>${post.mensaje}</p>


<small>${post.fecha}</small>




${isOwner()?`

<br><br>


<button class="blue" onclick="sendDiscord(${post.id})">

🔔 Discord

</button>



<button class="red" onclick="deletePost(${post.id})">

🗑 Eliminar

</button>



`:''}



</div>


`;



});









// ======================

// STAFF

// ======================



staff.innerHTML="";






if(isOwner()){



staff.innerHTML+=`

<div class="card">


<h3>👥 Agregar Staff</h3>



<input id="newUser" placeholder="Nombre (opcional)">



<input id="newRole" placeholder="Rango obligatorio">



<button class="green" onclick="addUser()">

Agregar

</button>



</div>



`;



}






USERS.forEach(u=>{



staff.innerHTML+=`

<div class="card user">



<div>


👤 ${u.username}


<span class="badge">

${u.role}

</span>


</div>




${isOwner()?`


<div class="actions">


<button class="blue"

onclick="editUser(${u.id},'${u.username}','${u.role}')">

✏️

</button>



<button class="red"

onclick="deleteUser(${u.id})">

🗑

</button>



</div>



`:''}



</div>


`;



});



}









async function addUser(){



if(!newRole.value){


alert("El rango es obligatorio");


return;


}




await fetch("/api/users",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

user:newUser.value,

role:newRole.value

})


});



loadAll();


}
  function editUser(id,nombre,rango){


let modal=document.createElement("div");


modal.className="modal";



modal.innerHTML=`

<div class="modal-box">


<h3>✏️ Editar Staff</h3>



<input id="editName" value="${nombre}" placeholder="Nombre">



<input id="editRole" value="${rango}" placeholder="Rango">



<button class="green" onclick="saveEdit(${id})">

Guardar

</button>



<button class="red" onclick="this.closest('.modal').remove()">

Cancelar

</button>



</div>


`;



document.body.appendChild(modal);


}








async function saveEdit(id){



let nombre=document.getElementById("editName").value;


let rango=document.getElementById("editRole").value;




if(!rango){


alert("El rango es obligatorio");


return;


}





let respuesta = await fetch("/api/users/"+id,{


method:"PUT",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


user:nombre,

role:rango


})


});



let data=await respuesta.json();




if(!data.success){


alert("Error al actualizar");


return;


}





let modal=document.querySelector(".modal");


if(modal){


modal.remove();


}



loadAll();


}








async function deleteUser(id){



if(!confirm("¿Eliminar usuario?")) return;




await fetch("/api/users/"+id,{


method:"DELETE"


});



loadAll();


}









async function crearPost(){



await fetch("/api/posts",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


titulo:titulo.value,

mensaje:mensaje.value


})


});



loadAll();


}








async function deletePost(id){



if(!confirm("¿Eliminar actualización?")) return;




await fetch("/api/posts/"+id,{


method:"DELETE"


});



loadAll();


}








async function sendDiscord(id){



let post = POSTS.find(x=>x.id===id);



await fetch("/api/webhook",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify(post)


});



alert("✅ Actualización enviada a Discord");


}






</script>


</body>


</html>
